<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAP O2C Graph</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;overflow:hidden;}

#app{display:flex;height:100vh;width:100vw;}

/* ── Graph panel ─────────────────────────────── */
#graph-panel{flex:1;position:relative;overflow:hidden;background:#f8fafc;}
#graph-svg{width:100%;height:100%;display:block;cursor:grab;}
#graph-svg:active{cursor:grabbing;}

/* Legend */
#legend{position:absolute;top:12px;left:12px;background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:11.5px;}
.li{display:flex;align-items:center;gap:8px;margin-bottom:5px;color:#64748b;}
.li:last-child{margin-bottom:0;}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* Node info card */
#node-info{position:absolute;bottom:14px;left:14px;background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;padding:12px 16px;font-size:12.5px;min-width:210px;max-width:260px;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
#node-info.show{display:block;}
#ni-type{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
#ni-label{font-weight:500;color:#0f172a;margin-bottom:3px;font-size:13px;}
#ni-id{color:#94a3b8;font-size:11px;font-family:monospace;}
#ni-close{position:absolute;top:8px;right:10px;cursor:pointer;color:#94a3b8;font-size:16px;line-height:1;}
#ni-close:hover{color:#475569;}

/* Controls */
#ctrl-bar{position:absolute;top:12px;right:12px;display:flex;gap:6px;}
.cbtn{background:#fff;border:0.5px solid #e2e8f0;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#475569;font-family:inherit;}
.cbtn:hover{background:#f1f5f9;}

/* Stats badge */
#stats{position:absolute;bottom:14px;right:14px;background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;padding:8px 14px;font-size:11px;color:#94a3b8;}

/* ── Chat panel ─────────────────────────────── */
#chat{width:320px;border-left:0.5px solid #e2e8f0;display:flex;flex-direction:column;background:#fff;flex-shrink:0;}

#ch-header{padding:14px 16px;border-bottom:0.5px solid #e2e8f0;}
#ch-title{font-size:13.5px;font-weight:500;color:#0f172a;}
#ch-sub{font-size:11px;color:#94a3b8;margin-top:2px;}

#ch-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}

.mrow{display:flex;gap:8px;align-items:flex-start;}
.mrow.usr{flex-direction:row-reverse;}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;flex-shrink:0;}
.mav.ai{background:#0f172a;color:#fff;}
.mav.you{background:#f1f5f9;color:#475569;border:0.5px solid #e2e8f0;font-size:9px;}
.mbbl{max-width:82%;padding:8px 11px;border-radius:10px;font-size:12.5px;line-height:1.6;word-break:break-word;}
.mbbl.ai{background:#f1f5f9;color:#334155;border-radius:2px 10px 10px 10px;}
.mbbl.usr{background:#0f172a;color:#fff;border-radius:10px 10px 2px 10px;}

/* Typing indicator */
.typing-wrap{display:flex;gap:8px;align-items:flex-start;}
.typing-bbl{background:#f1f5f9;border-radius:2px 10px 10px 10px;padding:10px 14px;display:flex;gap:5px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:#94a3b8;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Input area */
#ch-inp-area{padding:10px 12px;border-top:0.5px solid #e2e8f0;display:flex;gap:8px;align-items:center;}
#ch-inp{flex:1;padding:7px 11px;border-radius:8px;border:0.5px solid #e2e8f0;font-size:12.5px;background:#f8fafc;color:#0f172a;outline:none;font-family:inherit;}
#ch-inp:focus{border-color:#cbd5e1;background:#fff;}
#ch-send{padding:7px 14px;border-radius:8px;background:#0f172a;color:#fff;border:none;font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s;}
#ch-send:hover:not(:disabled){background:#1e293b;}
#ch-send:disabled{background:#e2e8f0;color:#94a3b8;cursor:default;}

/* SVG node styles */
.node-g{cursor:pointer;}
.node-circ{transition:filter .12s;}
.node-g:hover .node-circ{filter:brightness(1.18);}
.edge-l{fill:none;stroke:#94a3b8;stroke-opacity:.45;stroke-width:1;}
.node-lbl{font-family:system-ui,sans-serif;font-size:10px;fill:#64748b;pointer-events:none;user-select:none;}
</style>
</head>
<body>
<div id="app">

  <!-- ── Left: Graph ── -->
  <div id="graph-panel">
    <svg id="graph-svg">
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
          <polygon points="0 0,7 2.5,0 5" fill="#94a3b8" opacity=".55"/>
        </marker>
      </defs>
      <g id="g"></g>
    </svg>

    <div id="legend">
      <div class="li"><div class="ld" style="background:#3b82f6"></div>Customer</div>
      <div class="li"><div class="ld" style="background:#22c55e"></div>Order</div>
      <div class="li"><div class="ld" style="background:#ec4899"></div>Product</div>
      <div class="li"><div class="ld" style="background:#f97316"></div>Delivery</div>
      <div class="li"><div class="ld" style="background:#ef4444"></div>Billing</div>
      <div class="li"><div class="ld" style="background:#6b7280"></div>Payment</div>
      <div class="li"><div class="ld" style="background:#a855f7"></div>Journal</div>
    </div>

    <div id="node-info">
      <span id="ni-close">×</span>
      <div id="ni-type"></div>
      <div id="ni-label"></div>
      <div id="ni-id"></div>
    </div>

    <div id="ctrl-bar">
      <button class="cbtn" id="btn-reset">Reset view</button>
      <button class="cbtn" id="btn-fit">Fit all</button>
    </div>

    <div id="stats"></div>
  </div>

  <!-- ── Right: Chat ── -->
  <div id="chat">
    <div id="ch-header">
      <div id="ch-title">Chat with Graph</div>
      <div id="ch-sub">Order to Cash · Graph Agent</div>
    </div>
    <div id="ch-msgs">
      <div class="mrow">
        <div class="mav ai">AI</div>
        <div class="mbbl ai">Hi! I can help you analyze the <strong>Order to Cash</strong> process. Click any node or ask me a question.</div>
      </div>
    </div>
    <div id="ch-inp-area">
      <input id="ch-inp" type="text" placeholder="Analyze anything…"/>
      <button id="ch-send" disabled>Send</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// ── Constants ─────────────────────────────────────────
const COLORS = {
  customer:'#3b82f6', order:'#22c55e', product:'#ec4899',
  delivery:'#f97316', billing:'#ef4444', payment:'#6b7280', journal:'#a855f7'
};
const RADII = {
  customer:18, order:15, product:11, delivery:13,
  billing:12, payment:11, journal:10
};
const LINK_DIST = {
  customer:140, order:110, product:85, delivery:100,
  billing:90, payment:80, journal:75
};

// ── Mock data ─────────────────────────────────────────
const MOCK = {
  nodes:[
    {id:'C-108',type:'customer',label:'Amit Industries'},
    {id:'C-112',type:'customer',label:'Ravi Traders'},
    {id:'C-115',type:'customer',label:'Sundar Corp'},
    {id:'O-5001',type:'order',label:'Order 5001'},
    {id:'O-5002',type:'order',label:'Order 5002'},
    {id:'O-5003',type:'order',label:'Order 5003'},
    {id:'O-5004',type:'order',label:'Order 5004'},
    {id:'P-MAT01',type:'product',label:'Widget Alpha'},
    {id:'P-MAT02',type:'product',label:'Widget Beta'},
    {id:'P-MAT03',type:'product',label:'Premium Pack'},
    {id:'D-8001',type:'delivery',label:'Delivery 8001'},
    {id:'D-8002',type:'delivery',label:'Delivery 8002'},
    {id:'D-8003',type:'delivery',label:'Delivery 8003'},
    {id:'B-9001',type:'billing',label:'Invoice 9001'},
    {id:'B-9002',type:'billing',label:'Invoice 9002'},
    {id:'B-9100',type:'billing',label:'[Cancelled] 9100'},
    {id:'PAY-301',type:'payment',label:'Payment 301'},
    {id:'PAY-302',type:'payment',label:'Payment 302'},
    {id:'JE-401',type:'journal',label:'Journal 401'},
    {id:'JE-402',type:'journal',label:'Journal 402'},
  ],
  edges:[
    {source:'C-108',target:'O-5001',relation:'places'},
    {source:'C-108',target:'O-5002',relation:'places'},
    {source:'C-112',target:'O-5003',relation:'places'},
    {source:'C-115',target:'O-5004',relation:'places'},
    {source:'O-5001',target:'P-MAT01',relation:'contains'},
    {source:'O-5002',target:'P-MAT02',relation:'contains'},
    {source:'O-5003',target:'P-MAT01',relation:'contains'},
    {source:'O-5003',target:'P-MAT03',relation:'contains'},
    {source:'O-5004',target:'P-MAT02',relation:'contains'},
    {source:'O-5001',target:'D-8001',relation:'fulfilled_by'},
    {source:'O-5002',target:'D-8002',relation:'fulfilled_by'},
    {source:'O-5003',target:'D-8003',relation:'fulfilled_by'},
    {source:'D-8001',target:'B-9001',relation:'billed_as'},
    {source:'D-8002',target:'B-9002',relation:'billed_as'},
    {source:'D-8001',target:'B-9100',relation:'billed_as'},
    {source:'B-9001',target:'PAY-301',relation:'paid_by'},
    {source:'B-9002',target:'PAY-302',relation:'paid_by'},
    {source:'B-9001',target:'JE-401',relation:'journaled'},
    {source:'B-9002',target:'JE-402',relation:'journaled'},
  ]
};

// ── State ─────────────────────────────────────────────
let gData = null, selNode = null, isBusy = false, history = [], zoom, svgSel;

// ── Init ─────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch('/api/graph');
    if (!r.ok) throw 0;
    gData = await r.json();
  } catch { gData = MOCK; }
  buildGraph(gData);
  document.getElementById('stats').textContent =
    `${gData.nodes.length} nodes · ${gData.edges.length} edges`;
})();

// ── Build graph ───────────────────────────────────────
function buildGraph(data) {
  const panel = document.getElementById('graph-panel');
  const W = panel.clientWidth, H = panel.clientHeight;

  svgSel = d3.select('#graph-svg');
  const g  = d3.select('#g');

  // Zoom
  zoom = d3.zoom().scaleExtent([0.05, 6])
    .on('zoom', ev => g.attr('transform', ev.transform));
  svgSel.call(zoom).on('dblclick.zoom', null);

  // Deep-copy nodes/links for simulation
  const nodes = data.nodes.map(n => ({...n}));
  const links = data.edges.map(e => ({...e}));

  // Simulation
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d => {
      const avgR = ((RADII[d.source.type]||12) + (RADII[d.target.type]||12)) / 2;
      return avgR * 6.5;
    }))
    .force('charge', d3.forceManyBody().strength(d => -(RADII[d.type]||12)*18))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide(d => (RADII[d.type]||12) + 22))
    .alphaDecay(0.022);

  // Edges
  const edgeLayer = g.append('g').attr('class','edges');
  const edgeSel = edgeLayer.selectAll('line').data(links).enter().append('line')
    .attr('class','edge-l')
    .attr('marker-end','url(#arr)');

  // Nodes
  const nodeLayer = g.append('g').attr('class','nodes');
  const nodeG = nodeLayer.selectAll('.node-g').data(nodes).enter()
    .append('g').attr('class','node-g')
    .call(d3.drag()
      .on('start',(ev,d)=>{ if(!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
      .on('end',  (ev,d)=>{ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('click', (ev,d)=>{ ev.stopPropagation(); onNodeClick(d,nodeG); });

  nodeG.append('circle')
    .attr('class','node-circ')
    .attr('r', d=>RADII[d.type]||12)
    .attr('fill', d=>COLORS[d.type]||'#888')
    .attr('stroke','#fff')
    .attr('stroke-width',2);

  nodeG.append('text')
    .attr('class','node-lbl')
    .attr('dy', d=>(RADII[d.type]||12)+13)
    .attr('text-anchor','middle')
    .text(d=>{ const l=d.label||d.id; return l.length>18 ? l.slice(0,16)+'…' : l; });

  // Tick
  sim.on('tick', ()=>{
    edgeSel
      .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>edgeTX(d)).attr('y2',d=>edgeTY(d));
    nodeG.attr('transform',d=>`translate(${d.x|0},${d.y|0})`);
  });

  // Deselect on background click
  svgSel.on('click',()=>{ deselect(nodeG); });

  // Fit after sim settles
  sim.on('end', ()=> fitGraph(data, W, H));

  // Buttons
  document.getElementById('btn-reset').onclick = ()=>{
    svgSel.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
  };
  document.getElementById('btn-fit').onclick = ()=>fitGraph(data, W, H);
}

// Shorten edge to stop at circle border
function edgeTX(d){
  const dx=d.target.x-d.source.x, dy=d.target.y-d.source.y;
  const len=Math.hypot(dx,dy)||1, r=(RADII[d.target.type]||12)+4;
  return d.target.x-(dx/len)*r;
}
function edgeTY(d){
  const dx=d.target.x-d.source.x, dy=d.target.y-d.source.y;
  const len=Math.hypot(dx,dy)||1, r=(RADII[d.target.type]||12)+4;
  return d.target.y-(dy/len)*r;
}

// Auto-fit to show all nodes
function fitGraph(data, W, H){
  if(!data.nodes.length) return;
  const xs = data.nodes.map(n=>n.x||0), ys = data.nodes.map(n=>n.y||0);
  const x0=Math.min(...xs)-30, x1=Math.max(...xs)+30;
  const y0=Math.min(...ys)-30, y1=Math.max(...ys)+30;
  const scale = Math.min(0.85, 0.85/Math.max((x1-x0)/W,(y1-y0)/H));
  const tx = W/2 - scale*(x0+x1)/2, ty = H/2 - scale*(y0+y1)/2;
  svgSel.transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

// ── Node selection ────────────────────────────────────
function onNodeClick(d, nodeG){
  selNode = d;
  nodeG.selectAll('circle')
    .attr('stroke', n=>n.id===d.id?'#0f172a':'#fff')
    .attr('stroke-width', n=>n.id===d.id?3:2);

  const info = document.getElementById('node-info');
  document.getElementById('ni-type').textContent = (d.type||'node').toUpperCase();
  document.getElementById('ni-type').style.color = COLORS[d.type]||'#888';
  document.getElementById('ni-label').textContent = d.label||d.id;
  document.getElementById('ni-id').textContent = 'ID: '+d.id;
  info.classList.add('show');
}
function deselect(nodeG){
  selNode=null;
  if(nodeG) nodeG.selectAll('circle').attr('stroke','#fff').attr('stroke-width',2);
  document.getElementById('node-info').classList.remove('show');
}

document.getElementById('ni-close').onclick = ()=>deselect(d3.selectAll('.node-g'));

// ── Chat ─────────────────────────────────────────────
const inp    = document.getElementById('ch-inp');
const sendBtn= document.getElementById('ch-send');
const msgsEl = document.getElementById('ch-msgs');

inp.addEventListener('input', ()=>{ sendBtn.disabled = !inp.value.trim()||isBusy; });
inp.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey&&!sendBtn.disabled) sendMsg(); });
sendBtn.addEventListener('click', sendMsg);

function addMsg(role, html){
  const row = document.createElement('div');
  row.className = 'mrow'+(role==='user'?' usr':'');

  const av = document.createElement('div');
  av.className = 'mav '+(role==='user'?'you':'ai');
  av.textContent = role==='user'?'You':'AI';

  const bbl = document.createElement('div');
  bbl.className = 'mbbl '+(role==='user'?'usr':'ai');
  bbl.innerHTML = html;

  if(role==='user'){ row.appendChild(bbl); row.appendChild(av); }
  else { row.appendChild(av); row.appendChild(bbl); }

  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping(){
  const wrap = document.createElement('div');
  wrap.id='typing'; wrap.className='typing-wrap';
  const av = document.createElement('div'); av.className='mav ai'; av.textContent='AI';
  const bbl = document.createElement('div'); bbl.className='typing-bbl';
  bbl.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrap.appendChild(av); wrap.appendChild(bbl);
  msgsEl.appendChild(wrap); msgsEl.scrollTop=msgsEl.scrollHeight;
}
function hideTyping(){ const el=document.getElementById('typing'); if(el) el.remove(); }

function formatAI(txt){
  return txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

async function sendMsg(){
  const text=inp.value.trim(); if(!text||isBusy) return;
  inp.value=''; sendBtn.disabled=true; isBusy=true;

  addMsg('user', text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  showTyping();

  const graphCtx = gData
    ? `Graph: ${gData.nodes.length} nodes (${[...new Set(gData.nodes.map(n=>n.type))].join(', ')}), ${gData.edges.length} edges.`
    : '';
  const nodeCtx = selNode
    ? `\nSelected node: ${JSON.stringify({id:selNode.id,type:selNode.type,label:selNode.label})}`
    : '';

  history.push({role:'user',content:text});

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`You are an expert assistant for SAP Order-to-Cash (O2C) graph analysis.
The O2C flow: Customer → places Order → contains Products → fulfilled by Delivery → billed as Invoice → paid by Payment. Journal entries record accounting postings.
${graphCtx}${nodeCtx}
Be concise and informative. Use **bold** for key entity names and numbers.`,
        messages: history.map(m=>({role:m.role,content:m.content}))
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b=>b.type==='text')?.text || 'No response.';
    hideTyping();
    addMsg('assistant', formatAI(reply));
    history.push({role:'assistant',content:reply});
  } catch(err) {
    hideTyping();
    addMsg('assistant','Connection error — please check the API and try again.');
  }

  isBusy=false;
  sendBtn.disabled=!inp.value.trim();
}
</script>
</body>
</html>
